<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Bootstrap</title>
    <!-- Bootstrab CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <!-- container / container -->
         <h1 class="text-center text-uppercase">Box Office Anime</h1>
         <!-- Carousel -->
          <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="image/film1.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="image/film2.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="image/film3.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
         <!-- row 1 -->
         <div class="row">
            <div class="col">
                <img src="image/film1.jpg" alt="img-fluid">
            </div>
            <div class="col">
                <img src="image/film2.jpg" alt="img-fluid">
            </div>
            <div class="col">
                <img src="image/film3.jpg" alt="img-fluid">
            </div>

         <div class="row">
            <div class="col-lg-3 col-md-6">
                <img src="image/film4.jpg" alt="img-fluid">
            </div>
            <div class="col-lg-3 col-md-6">
                <img src="image/film5.jpg" alt="img-fluid">
            </div>
            <div class="col-lg-3 col-md-6">
                <img src="image/film6.jpg" alt="img-fluid">
            </div>
            <div class="col-lg-3 col-md-6">
                <img src="image/film7.jpg" alt="img-fluid">
            </div>
         </div>

         <div class="row">
            <div class="col-lg-3 col-md-12">
                <img src="image/film8.jpg" alt="img-fluid">
            </div>
            <div class="col-lg-3 col-md-12">
                <img src="image/film10.jpg" alt="img-fluid">
            </div>
            <div class="col-lg-3 col-md-12">
                <img src="image/film11.jpg" alt="img-fluid">
            </div>
         </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
